"$schema" = 'https://starship.rs/config-schema.json'
[username]
# style_user = "green bold"
# style_root = "red bold"
# format = "[$user]($style) "
# disabled = false
# show_always = true

[hostname]
ssh_symbol = "Όυ║"
style = "bold #669bbc"
# ssh_only = false
# format = '[$hostname](bold #a9d6e5) '
# trim_at = "."
# disabled = false

[character]
success_symbol = '[>](bold #a9d6e5) '
error_symbol = '[>](bold red) '

# configure directory
[directory]
read_only = " ≤░Ν╛"
format = "[$path](italic bold #a9d6e5)[$read_only]($read_only_style) "
# truncates directory to root folder if in github repo
truncation_length = 10
truncate_to_repo = true
style = "bold italic blue"

[cmd_duration]
min_time = 4
show_milliseconds = false
disabled = false
style = "bold italic red"

[aws]
symbol = "ΌΝ╜  "

[conda]
symbol = "ΎΕΝ "

[c]
symbol = "Όαη "

[dart]
symbol = "Όηα "

[docker_context]
symbol = "≤░κρ "
format = "via [$symbol$context]($style) "
style = "blue bold"
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]
detect_folders = []
disabled = false

[elixir]
symbol = "ΌΚ╡ "

[elm]
symbol = "Όαυ "

[git_branch]
symbol = "ΎΡα "

[golang]
